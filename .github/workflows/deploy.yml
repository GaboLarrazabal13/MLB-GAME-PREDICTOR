# =============================================================================
# MLB Predictor V3.5 - Deploy Pipeline
# Runs on pushes to main branch after CI passes
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ---------------------------------------------------------------------------
  # Build and Push Docker Image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve Docker image name
        id: image
        run: |
          if [ -n "${{ vars.DOCKERHUB_IMAGE_NAME }}" ]; then
            echo "image_name=${{ vars.DOCKERHUB_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "image_name=${{ secrets.DOCKERHUB_USERNAME }}/mlb-game-predictor" >> "$GITHUB_OUTPUT"
          else
            echo "Missing Docker Hub configuration. Define vars.DOCKERHUB_IMAGE_NAME or secrets.DOCKERHUB_USERNAME."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.image_name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=ref,event=branch

      - name: Build and push Docker image
        id: build_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Print image digest
        run: echo ${{ steps.build_push.outputs.digest }}

  # ---------------------------------------------------------------------------
  # Deploy to Render (API)
  # ---------------------------------------------------------------------------
  deploy-render-api:
    name: Deploy to Render (API)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Trigger Render Deploy (API)
        env:
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_API_TOKEN" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' \
              --silent \
              --show-error
            echo "Render deploy triggered successfully"
          else
            echo "Render credentials not configured, skipping deploy"
          fi

  # ---------------------------------------------------------------------------
  # Notify Deployment (optional)
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-render-api]
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    
    steps:
      - name: Create deployment status
        run: |
          echo "Deployment workflow completed"
          echo "Status: ${{ needs.deploy-render-api.result }}"
