# =============================================================================
# MLB Predictor V3.5 - Deploy Pipeline
# Runs on pushes to main branch after CI passes
# =============================================================================

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Build and Push Docker Image
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=branch
            type=sha,prefixref,event==
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Print image digest
        run: echo ${{ steps.meta.outputs.digest }}

  # ---------------------------------------------------------------------------
  # Deploy to Render (API)
  # ---------------------------------------------------------------------------
  deploy-render-api:
    name: Deploy to Render (API)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push'
    
    steps:
      - name: Trigger Render Deploy (API)
        env:
          RENDER_API_TOKEN: ${{ secrets.RENDER_API_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_API_SERVICE_ID }}
        run: |
          if [ -n "$RENDER_API_TOKEN" ] && [ -n "$RENDER_SERVICE_ID" ]; then
            curl -X POST "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys" \
              -H "Authorization: Bearer $RENDER_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{"clearCache": false}' \
              --silent \
              --show-error
            echo "Render deploy triggered successfully"
          else
            echo "Render credentials not configured, skipping deploy"
          fi

  # ---------------------------------------------------------------------------
  # Notify Deployment (optional)
  # ---------------------------------------------------------------------------
  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-render-api]
    if: always() && github.event_name == 'push'
    
    steps:
      - name: Create deployment status
        run: |
          echo "Deployment workflow completed"
          echo "Status: ${{ needs.deploy-render-api.result }}"
