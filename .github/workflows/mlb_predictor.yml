name: MLB Predictor Automation

on:
  schedule:
    # Horarios en UTC. Referencia operativa en ET (America/New_York).
    # Update de resultados reales (día siguiente)
    - cron: '30 16 * * *'
    # Scraping principal
    - cron: '30 17 * * *'
    # Validación post-scrape / tareas posteriores
    - cron: '30 18 * * *'
  
  workflow_dispatch:  # Permite ejecución manual
    inputs:
      job:
        description: 'Job a ejecutar'
        required: true
        default: 'scrape'
        type: choice
        options:
          - all
          - backfill_range
          - scrape
          - post_scrape_validate
          - update_results
          - train
          - predict
      target_date:
        description: 'Fecha objetivo opcional para predicción/backfill (YYYY-MM-DD). Vacío = fecha más reciente.'
        required: false
        default: ''
        type: string
      target_end_date:
        description: 'Fecha final opcional para backfill por rango (YYYY-MM-DD). Vacío = mismo día que target_date.'
        required: false
        default: ''
        type: string

concurrency:
  group: mlb-predictor-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ============================================================================
  # JOB MANUAL: BACKFILL POR RANGO DE FECHAS
  # ============================================================================
  backfill_range_pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'backfill_range'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Restaurar caché de datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-

      - name: Validar rango de fechas
        id: validate_range
        run: |
          START_RAW='${{ github.event.inputs.target_date }}'
          END_RAW='${{ github.event.inputs.target_end_date }}'

          if [ -z "$START_RAW" ]; then
            echo "❌ target_date es obligatorio para job=backfill_range"
            exit 1
          fi

          if [ -z "$END_RAW" ]; then
            END_RAW="$START_RAW"
          fi

          if ! date -d "$START_RAW" >/dev/null 2>&1; then
            echo "❌ target_date inválida: $START_RAW (usa YYYY-MM-DD)"
            exit 1
          fi

          if ! date -d "$END_RAW" >/dev/null 2>&1; then
            echo "❌ target_end_date inválida: $END_RAW (usa YYYY-MM-DD)"
            exit 1
          fi

          START_DATE=$(date -d "$START_RAW" +%Y-%m-%d)
          END_DATE=$(date -d "$END_RAW" +%Y-%m-%d)

          if [ "$(date -d "$START_DATE" +%s)" -gt "$(date -d "$END_DATE" +%s)" ]; then
            echo "❌ Rango inválido: target_date ($START_DATE) es mayor que target_end_date ($END_DATE)"
            exit 1
          fi

          TOTAL_DIAS=$(( ( $(date -d "$END_DATE" +%s) - $(date -d "$START_DATE" +%s) ) / 86400 + 1 ))

          echo "✅ Rango validado: $START_DATE -> $END_DATE ($TOTAL_DIAS día/s)"
          echo "start_date=$START_DATE" >> "$GITHUB_OUTPUT"
          echo "end_date=$END_DATE" >> "$GITHUB_OUTPUT"
          echo "total_days=$TOTAL_DIAS" >> "$GITHUB_OUTPUT"

      - name: Ejecutar backfill día por día (scrape + predict + update_results)
        id: run_backfill
        run: |
          START_DATE='${{ steps.validate_range.outputs.start_date }}'
          END_DATE='${{ steps.validate_range.outputs.end_date }}'
          CURRENT_DATE="$START_DATE"
          OK_COUNT=0
          FAILED_COUNT=0
          OK_FILE=$(mktemp)
          FAIL_FILE=$(mktemp)

          echo "🚀 Iniciando backfill de $START_DATE a $END_DATE"

          while [ "$(date -d "$CURRENT_DATE" +%s)" -le "$(date -d "$END_DATE" +%s)" ]; do
            echo ""
            echo "=============================================================="
            echo "📅 Procesando fecha: $CURRENT_DATE"
            echo "=============================================================="
            DATE_FAILED=0

            cd src

            if ! RUN_SOURCE=workflow TARGET_DATE="$CURRENT_DATE" SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py; then
              echo "❌ Falló scraping para $CURRENT_DATE"
              DATE_FAILED=1
            fi

            if ! RUN_SOURCE=workflow TARGET_DATE="$CURRENT_DATE" python mlb_predict_engine.py; then
              echo "❌ Falló predicción para $CURRENT_DATE"
              DATE_FAILED=1
            fi

            if ! TARGET_DATE="$CURRENT_DATE" python mlb_update_real_results.py; then
              echo "❌ Falló actualización de resultados para $CURRENT_DATE"
              DATE_FAILED=1
            fi

            cd ..

            if [ "$DATE_FAILED" -eq 0 ]; then
              OK_COUNT=$((OK_COUNT + 1))
              echo "$CURRENT_DATE" >> "$OK_FILE"
              echo "✅ Fecha completada: $CURRENT_DATE"
            else
              FAILED_COUNT=$((FAILED_COUNT + 1))
              echo "$CURRENT_DATE" >> "$FAIL_FILE"
              echo "⚠️ Fecha con errores: $CURRENT_DATE"
            fi

            CURRENT_DATE=$(date -d "$CURRENT_DATE +1 day" +%Y-%m-%d)
          done

          echo ""
          echo "================ Resumen Backfill ================"
          echo "✅ Fechas exitosas: $OK_COUNT"
          cat "$OK_FILE" || true
          echo "⚠️ Fechas con error: $FAILED_COUNT"
          cat "$FAIL_FILE" || true
          echo "=================================================="

          {
            echo "ok_count=$OK_COUNT"
            echo "failed_count=$FAILED_COUNT"
            echo "ok_dates<<EOF"
            cat "$OK_FILE" || true
            echo "EOF"
            echo "failed_dates<<EOF"
            cat "$FAIL_FILE" || true
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Mostrar resumen consolidado
        run: |
          echo "Backfill completado."
          echo "- Exitosas: ${{ steps.run_backfill.outputs.ok_count }}"
          echo "- Fallidas: ${{ steps.run_backfill.outputs.failed_count }}"
          echo "Fechas exitosas:"
          echo '${{ steps.run_backfill.outputs.ok_dates }}'
          echo "Fechas fallidas:"
          echo '${{ steps.run_backfill.outputs.failed_dates }}'

      - name: Commit y push de resultados por rango
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/ models/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🗓️ Backfill por rango: ${{ steps.validate_range.outputs.start_date }} a ${{ steps.validate_range.outputs.end_date }}"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done

      - name: Marcar fallo si hubo fechas fallidas
        if: steps.run_backfill.outputs.failed_count != '0'
        run: |
          echo "❌ Backfill completado con fechas fallidas. Revisar log de resumen."
          exit 1

  # ============================================================================
  # JOB MANUAL: PIPELINE COMPLETO SECUENCIAL
  # ============================================================================
  manual_all_pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'all'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Restaurar caché de datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-

      - name: Actualizar resultados reales
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          cd src
          python mlb_update_real_results.py

      - name: Verificar milestone de reentrenamiento
        id: check_training_all
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          MILESTONES = [486, 972, 1458, 1944, 2430]
          season = str(datetime.now(ZoneInfo("America/New_York")).year)

          with sqlite3.connect(DB_PATH) as conn:
            conn.execute(
              "CREATE TABLE IF NOT EXISTS metadata_entrenamiento (key TEXT PRIMARY KEY, value TEXT)"
            )
            total = conn.execute(
              "SELECT COUNT(*) FROM historico_real WHERE substr(fecha,1,4)=?",
              (season,),
            ).fetchone()[0]

            row = conn.execute(
              "SELECT value FROM metadata_entrenamiento WHERE key='last_retrain_milestone'"
            ).fetchone()
            try:
              last_milestone = int(row[0]) if row and row[0] else 0
            except Exception:
              last_milestone = 0

          next_milestone = next((m for m in MILESTONES if m > last_milestone), None)
          should_train = next_milestone is not None and total >= next_milestone

          print(f"TOTAL_GAMES={total}")
          print(f"LAST_MILESTONE={last_milestone}")
          print(f"NEXT_MILESTONE={next_milestone}")
          print(f"SHOULD_TRAIN={'true' if should_train else 'false'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_games={total}\n")
            f.write(f"next_milestone={next_milestone}\n")
            f.write(f"should_train={'true' if should_train else 'false'}\n")
          PY

      - name: Ejecutar reentrenamiento incremental
        if: steps.check_training_all.outputs.should_train == 'true'
        run: |
          cd src
          python train_model_hybrid_actions.py

      - name: Ejecutar scraping diario
        id: scrape_all
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
        continue-on-error: true

      - name: Generar predicciones si hay datos nuevos
        if: steps.scrape_all.outcome == 'success'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Validar fecha de cartelera (ET)
        id: validate_dates_all
        if: steps.scrape_all.outcome == 'success'
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          target_date = '${{ github.event.inputs.target_date }}'.strip()
          expected_date = target_date or today_et

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          is_ok = (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games == expected_date
          )
          print(f"today_et={today_et}")
          print(f"target_date={target_date}")
          print(f"expected_date={expected_date}")
          print(f"max_games={max_games}")
          print(f"max_preds={max_preds}")
          print(f"is_ok={is_ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"today_et={today_et}\n")
              f.write(f"expected_date={expected_date}\n")
              f.write(f"max_games={max_games}\n")
              f.write(f"max_preds={max_preds}\n")
              f.write(f"is_ok={'true' if is_ok else 'false'}\n")
          PY

      - name: Reintentar scraping y predicción por desfase de fecha
        if: steps.scrape_all.outcome == 'success' && steps.validate_dates_all.outputs.is_ok != 'true'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Revalidar fecha de cartelera (ET)
        if: steps.scrape_all.outcome == 'success' && steps.validate_dates_all.outputs.is_ok != 'true'
        run: |
          cd src
          python - <<'PY'
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          target_date = '${{ github.event.inputs.target_date }}'.strip()
          expected_date = target_date or today_et

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          print(
              "Post-retry => "
              f"today_et={today_et}, target_date={target_date}, expected_date={expected_date}, "
              f"max_games={max_games}, max_preds={max_preds}"
          )
          if not (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games == expected_date
          ):
              raise SystemExit("❌ Desfase de fecha persiste tras reintento de scraper/predict")
          PY

      - name: Commit y push de cambios automáticos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/ models/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🤖 Actualización automática completa: $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done

  # ============================================================================
  # JOB 1: SCRAPING DIARIO (schedule principal + manual)
  # ============================================================================
  scrape_daily_games:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 17 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar caché de datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Ejecutar scraping diario
        id: scrape
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
        continue-on-error: true

      - name: Generar predicciones si hay datos nuevos
        if: steps.scrape.outcome == 'success'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Verificar y sanar huecos recientes (Auto-Heal)
        if: steps.scrape.outcome == 'success'
        run: |
          cd src
          # El mass healer buscará huecos en la temporada y los arreglará
          python mlb_mass_healer.py

      - name: Validar fecha de cartelera (ET)
        id: validate_dates_scrape
        if: steps.scrape.outcome == 'success'
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          target_date = '${{ github.event.inputs.target_date }}'.strip()
          expected_date = target_date or today_et

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          is_ok = (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games == expected_date
          )
          print(f"today_et={today_et}")
          print(f"target_date={target_date}")
          print(f"expected_date={expected_date}")
          print(f"max_games={max_games}")
          print(f"max_preds={max_preds}")
          print(f"is_ok={is_ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"today_et={today_et}\n")
              f.write(f"expected_date={expected_date}\n")
              f.write(f"max_games={max_games}\n")
              f.write(f"max_preds={max_preds}\n")
              f.write(f"is_ok={'true' if is_ok else 'false'}\n")
          PY

      - name: Reintentar scraping y predicción por desfase de fecha
        if: steps.scrape.outcome == 'success' && steps.validate_dates_scrape.outputs.is_ok != 'true'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Revalidar fecha de cartelera (ET)
        if: steps.scrape.outcome == 'success' && steps.validate_dates_scrape.outputs.is_ok != 'true'
        run: |
          cd src
          python - <<'PY'
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          target_date = '${{ github.event.inputs.target_date }}'.strip()
          expected_date = target_date or today_et

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          print(
              "Post-retry => "
              f"today_et={today_et}, target_date={target_date}, expected_date={expected_date}, "
              f"max_games={max_games}, max_preds={max_preds}"
          )
          if not (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games == expected_date
          ):
              raise SystemExit("❌ Desfase de fecha persiste tras reintento de scraper/predict")
          PY

      - name: Commit y push de datos actualizados
        if: steps.scrape.outcome == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "📊 Actualización automática: Scraping $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true

  # ============================================================================
  # JOB 1B: VALIDACION POST-SCRAPING (1H DESPUES)
  # ============================================================================
  post_scrape_validation:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'post_scrape_validate')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Restaurar caché de datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-

      - name: Validar y recuperar juegos con anomalias
        id: post_validate
        continue-on-error: true
        run: |
          cd src
          POST_SCRAPE_MAX_ATTEMPTS=3 POST_SCRAPE_WAIT_SECONDS=300 python post_scrape_pitcher_recovery.py

      - name: Commit y push de correcciones post-scrape
        if: steps.post_validate.outcome == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🩺 Validación post-scrape: correcciones automáticas $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done

      - name: Marcar fallo del job si persisten anomalias
        if: steps.post_validate.outcome != 'success'
        run: |
          echo "❌ Persisten anomalias tras 3 intentos post-scrape. Requiere ejecucion manual."
          exit 1
  
  # ============================================================================
  # JOB 2: ACTUALIZACIÓN DE RESULTADOS (schedule + manual)
  # ============================================================================
  update_real_results:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 16 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'update_results')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Actualizar resultados reales
        env:
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: |
          cd src
          python mlb_update_real_results.py
      
      - name: Commit y push de resultados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "✅ Resultados reales actualizados: $(date +'%Y-%m-%d')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
  
  # ============================================================================
  # JOB 3: REENTRENAMIENTO INCREMENTAL (schedule + manual)
  # ============================================================================
  incremental_training:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 17 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'train')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos y modelo
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Verificar milestone de reentrenamiento
        id: check_training
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          MILESTONES = [486, 972, 1458, 1944, 2430]
          season = str(datetime.now(ZoneInfo("America/New_York")).year)

          with sqlite3.connect(DB_PATH) as conn:
            conn.execute(
              "CREATE TABLE IF NOT EXISTS metadata_entrenamiento (key TEXT PRIMARY KEY, value TEXT)"
            )
            total = conn.execute(
              "SELECT COUNT(*) FROM historico_real WHERE substr(fecha,1,4)=?",
              (season,),
            ).fetchone()[0]

            row = conn.execute(
              "SELECT value FROM metadata_entrenamiento WHERE key='last_retrain_milestone'"
            ).fetchone()
            try:
              last_milestone = int(row[0]) if row and row[0] else 0
            except Exception:
              last_milestone = 0

          next_milestone = next((m for m in MILESTONES if m > last_milestone), None)
          should_train = next_milestone is not None and total >= next_milestone

          print(f"TOTAL_GAMES={total}")
          print(f"LAST_MILESTONE={last_milestone}")
          print(f"NEXT_MILESTONE={next_milestone}")
          print(f"SHOULD_TRAIN={'true' if should_train else 'false'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_games={total}\n")
            f.write(f"next_milestone={next_milestone}\n")
            f.write(f"SHOULD_TRAIN={'true' if should_train else 'false'}\n")
          PY
      
      - name: Ejecutar reentrenamiento incremental
        if: steps.check_training.outputs.SHOULD_TRAIN == 'true'
        run: |
          cd src
          python train_model_hybrid_actions.py
      
      - name: Commit modelo actualizado
        if: steps.check_training.outputs.SHOULD_TRAIN == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add models/ data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🤖 Modelo reentrenado: $(date +'%Y-%m-%d') — milestone ${{ steps.check_training.outputs.next_milestone }}/2430"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
  
  # ============================================================================
  # JOB 4: GENERAR PREDICCIONES (Después de scraping exitoso)
  # ============================================================================
  generate_predictions:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'predict'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos
        uses: actions/cache@v4
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Generar predicciones
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py
      
      - name: Commit predicciones
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🎯 Predicciones generadas: $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
