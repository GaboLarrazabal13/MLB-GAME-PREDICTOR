name: MLB Predictor Automation

on:
  schedule:
    # Referencia operativa en horario USA (America/New_York)
    # Scraping principal: ~12:30 ET en horario de verano (~11:30 ET en invierno)
    - cron: '30 17 * * *'
    # Reentrenamiento una hora después: ~13:30 ET en verano (~12:30 ET en invierno)
    - cron: '30 18 * * *'
  
  workflow_dispatch:  # Permite ejecución manual
    inputs:
      job:
        description: 'Job a ejecutar'
        required: true
        default: 'scrape'
        type: choice
        options:
          - all
          - scrape
          - post_scrape_validate
          - update_results
          - train
          - predict
      target_date:
        description: 'Fecha objetivo opcional para predicción/backfill (YYYY-MM-DD). Vacío = fecha más reciente.'
        required: false
        default: ''
        type: string

concurrency:
  group: mlb-predictor-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ============================================================================
  # JOB MANUAL: PIPELINE COMPLETO SECUENCIAL
  # ============================================================================
  manual_all_pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'all'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Restaurar caché de datos
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-

      - name: Actualizar resultados reales
        run: |
          cd src
          python mlb_update_real_results.py

      - name: Verificar milestone de reentrenamiento
        id: check_training_all
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          MILESTONES = [486, 972, 1458, 1944, 2430]
          season = str(datetime.now(ZoneInfo("America/New_York")).year)

          with sqlite3.connect(DB_PATH) as conn:
            conn.execute(
              "CREATE TABLE IF NOT EXISTS metadata_entrenamiento (key TEXT PRIMARY KEY, value TEXT)"
            )
            total = conn.execute(
              "SELECT COUNT(*) FROM historico_real WHERE substr(fecha,1,4)=?",
              (season,),
            ).fetchone()[0]

            row = conn.execute(
              "SELECT value FROM metadata_entrenamiento WHERE key='last_retrain_milestone'"
            ).fetchone()
            try:
              last_milestone = int(row[0]) if row and row[0] else 0
            except Exception:
              last_milestone = 0

          next_milestone = next((m for m in MILESTONES if m > last_milestone), None)
          should_train = next_milestone is not None and total >= next_milestone

          print(f"TOTAL_GAMES={total}")
          print(f"LAST_MILESTONE={last_milestone}")
          print(f"NEXT_MILESTONE={next_milestone}")
          print(f"SHOULD_TRAIN={'true' if should_train else 'false'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_games={total}\n")
            f.write(f"next_milestone={next_milestone}\n")
            f.write(f"should_train={'true' if should_train else 'false'}\n")
          PY

      - name: Ejecutar reentrenamiento incremental
        if: steps.check_training_all.outputs.should_train == 'true'
        run: |
          cd src
          python train_model_hybrid_actions.py

      - name: Ejecutar scraping diario
        id: scrape_all
        run: |
          cd src
          RUN_SOURCE=workflow SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
        continue-on-error: true

      - name: Generar predicciones si hay datos nuevos
        if: steps.scrape_all.outcome == 'success'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Validar fecha de cartelera (ET)
        id: validate_dates_all
        if: steps.scrape_all.outcome == 'success'
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          yesterday_et = (now_et - timedelta(days=1)).strftime("%Y-%m-%d")
          valid_dates = {today_et, yesterday_et}

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          is_ok = (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games in valid_dates
          )
          print(f"today_et={today_et}")
          print(f"yesterday_et={yesterday_et}")
          print(f"max_games={max_games}")
          print(f"max_preds={max_preds}")
          print(f"is_ok={is_ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"today_et={today_et}\n")
              f.write(f"max_games={max_games}\n")
              f.write(f"max_preds={max_preds}\n")
              f.write(f"is_ok={'true' if is_ok else 'false'}\n")
          PY

      - name: Reintentar scraping y predicción por desfase de fecha
        if: steps.scrape_all.outcome == 'success' && steps.validate_dates_all.outputs.is_ok != 'true'
        run: |
          cd src
          RUN_SOURCE=workflow SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Revalidar fecha de cartelera (ET)
        if: steps.scrape_all.outcome == 'success' && steps.validate_dates_all.outputs.is_ok != 'true'
        run: |
          cd src
          python - <<'PY'
          import sqlite3
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          yesterday_et = (now_et - timedelta(days=1)).strftime("%Y-%m-%d")
          valid_dates = {today_et, yesterday_et}

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          print(
              "Post-retry => "
              f"today_et={today_et}, yesterday_et={yesterday_et}, "
              f"max_games={max_games}, max_preds={max_preds}"
          )
          if not (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games in valid_dates
          ):
              raise SystemExit("❌ Desfase de fecha persiste tras reintento de scraper/predict")
          PY

      - name: Commit y push de cambios automáticos
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/ models/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🤖 Actualización automática completa: $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done

  # ============================================================================
  # JOB 1: SCRAPING DIARIO (10 AM y 1 PM)
  # ============================================================================
  scrape_daily_games:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 17 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'scrape')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar caché de datos
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Ejecutar scraping diario
        id: scrape
        run: |
          cd src
          RUN_SOURCE=workflow SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
        continue-on-error: true

      - name: Generar predicciones si hay datos nuevos
        if: steps.scrape.outcome == 'success'
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Validar fecha de cartelera (ET)
        id: validate_dates_scrape
        if: steps.scrape.outcome == 'success'
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          yesterday_et = (now_et - timedelta(days=1)).strftime("%Y-%m-%d")
          valid_dates = {today_et, yesterday_et}

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          is_ok = (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games in valid_dates
          )
          print(f"today_et={today_et}")
          print(f"yesterday_et={yesterday_et}")
          print(f"max_games={max_games}")
          print(f"max_preds={max_preds}")
          print(f"is_ok={is_ok}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"today_et={today_et}\n")
              f.write(f"max_games={max_games}\n")
              f.write(f"max_preds={max_preds}\n")
              f.write(f"is_ok={'true' if is_ok else 'false'}\n")
          PY

      - name: Reintentar scraping y predicción por desfase de fecha
        if: steps.scrape.outcome == 'success' && steps.validate_dates_scrape.outputs.is_ok != 'true'
        run: |
          cd src
          RUN_SOURCE=workflow SCRAPER_BETWEEN_GAMES_SECONDS=0 SCRAPER_ADAPTIVE_DELAY_ON_FAIL_SECONDS=10 SCRAPER_PREVIEW_RETRIES=3 SCRAPER_PREVIEW_RETRY_WAIT_SECONDS=8 SCRAPER_SAVE_PARTIAL_ON_FINAL=1 python mlb_daily_scraper.py
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py

      - name: Revalidar fecha de cartelera (ET)
        if: steps.scrape.outcome == 'success' && steps.validate_dates_scrape.outputs.is_ok != 'true'
        run: |
          cd src
          python - <<'PY'
          import sqlite3
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          now_et = datetime.now(ZoneInfo("America/New_York"))
          today_et = now_et.strftime("%Y-%m-%d")
          yesterday_et = (now_et - timedelta(days=1)).strftime("%Y-%m-%d")
          valid_dates = {today_et, yesterday_et}

          with sqlite3.connect(DB_PATH) as conn:
              max_games = conn.execute("SELECT MAX(fecha) FROM historico_partidos").fetchone()[0]
              max_preds = conn.execute("SELECT MAX(fecha) FROM predicciones_historico").fetchone()[0]

          print(
              "Post-retry => "
              f"today_et={today_et}, yesterday_et={yesterday_et}, "
              f"max_games={max_games}, max_preds={max_preds}"
          )
          if not (
              bool(max_games)
              and bool(max_preds)
              and max_games == max_preds
              and max_games in valid_dates
          ):
              raise SystemExit("❌ Desfase de fecha persiste tras reintento de scraper/predict")
          PY

      - name: Commit y push de datos actualizados
        if: steps.scrape.outcome == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "📊 Actualización automática: Scraping $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true

  # ============================================================================
  # JOB 1B: VALIDACION POST-SCRAPING (1H DESPUES)
  # ============================================================================
  post_scrape_validation:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 18 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'post_scrape_validate')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Restaurar caché de datos
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-

      - name: Validar y recuperar juegos con anomalias
        id: post_validate
        continue-on-error: true
        run: |
          cd src
          POST_SCRAPE_MAX_ATTEMPTS=3 POST_SCRAPE_WAIT_SECONDS=300 python post_scrape_pitcher_recovery.py

      - name: Commit y push de correcciones post-scrape
        if: steps.post_validate.outcome == 'success'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🩺 Validación post-scrape: correcciones automáticas $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done

      - name: Marcar fallo del job si persisten anomalias
        if: steps.post_validate.outcome != 'success'
        run: |
          echo "❌ Persisten anomalias tras 3 intentos post-scrape. Requiere ejecucion manual."
          exit 1
  
  # ============================================================================
  # JOB 2: ACTUALIZACIÓN DE RESULTADOS (5 AM del día siguiente)
  # ============================================================================
  update_real_results:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 16 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'update_results')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Actualizar resultados reales
        run: |
          cd src
          python mlb_update_real_results.py
      
      - name: Commit y push de resultados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "✅ Resultados reales actualizados: $(date +'%Y-%m-%d')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
  
  # ============================================================================
  # JOB 3: REENTRENAMIENTO INCREMENTAL (6 AM diario)
  # ============================================================================
  incremental_training:
    runs-on: ubuntu-latest
    if: |
      github.event.schedule == '30 17 * * *' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'train')
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos y modelo
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Verificar milestone de reentrenamiento
        id: check_training
        run: |
          cd src
          python - <<'PY'
          import os
          import sqlite3
          from datetime import datetime
          from zoneinfo import ZoneInfo
          from mlb_config import DB_PATH

          MILESTONES = [486, 972, 1458, 1944, 2430]
          season = str(datetime.now(ZoneInfo("America/New_York")).year)

          with sqlite3.connect(DB_PATH) as conn:
            conn.execute(
              "CREATE TABLE IF NOT EXISTS metadata_entrenamiento (key TEXT PRIMARY KEY, value TEXT)"
            )
            total = conn.execute(
              "SELECT COUNT(*) FROM historico_real WHERE substr(fecha,1,4)=?",
              (season,),
            ).fetchone()[0]

            row = conn.execute(
              "SELECT value FROM metadata_entrenamiento WHERE key='last_retrain_milestone'"
            ).fetchone()
            try:
              last_milestone = int(row[0]) if row and row[0] else 0
            except Exception:
              last_milestone = 0

          next_milestone = next((m for m in MILESTONES if m > last_milestone), None)
          should_train = next_milestone is not None and total >= next_milestone

          print(f"TOTAL_GAMES={total}")
          print(f"LAST_MILESTONE={last_milestone}")
          print(f"NEXT_MILESTONE={next_milestone}")
          print(f"SHOULD_TRAIN={'true' if should_train else 'false'}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
            f.write(f"total_games={total}\n")
            f.write(f"next_milestone={next_milestone}\n")
            f.write(f"SHOULD_TRAIN={'true' if should_train else 'false'}\n")
          PY
      
      - name: Ejecutar reentrenamiento incremental
        if: steps.check_training.outputs.SHOULD_TRAIN == 'true'
        run: |
          cd src
          python train_model_hybrid_actions.py
      
      - name: Commit modelo actualizado
        if: steps.check_training.outputs.SHOULD_TRAIN == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add models/ data/ cache/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🤖 Modelo reentrenado: $(date +'%Y-%m-%d') — milestone ${{ steps.check_training.outputs.next_milestone }}/2430"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
  
  # ============================================================================
  # JOB 4: GENERAR PREDICCIONES (Después de scraping exitoso)
  # ============================================================================
  generate_predictions:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'predict'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
      
      - name: Restaurar datos
        uses: actions/cache@v3
        with:
          path: |
            data/
            models/
            cache/
          key: mlb-data-${{ github.sha }}
          restore-keys: |
            mlb-data-
      
      - name: Generar predicciones
        run: |
          cd src
          RUN_SOURCE=workflow TARGET_DATE='${{ github.event.inputs.target_date }}' python mlb_predict_engine.py
      
      - name: Commit predicciones
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          if git diff --cached --quiet; then
            echo "No hay cambios para commit"
            exit 0
          fi
          git commit -m "🎯 Predicciones generadas: $(date +'%Y-%m-%d %H:%M')"
          for intento in 1 2 3; do
            git pull --no-rebase -X ours origin ${{ github.ref_name }} || true
            if git push origin HEAD:${{ github.ref_name }}; then
              echo "Push exitoso en intento $intento"
              break
            fi
            if [ "$intento" -eq 3 ]; then
              echo "❌ No se pudo hacer push tras 3 intentos"
              exit 1
            fi
            echo "⚠️ Reintentando push ($intento/3)..."
            sleep 3
          done
        continue-on-error: true
