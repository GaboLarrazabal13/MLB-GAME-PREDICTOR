# =============================================================================
# MLB Predictor V3.5 - Docker Compose
# Orchestrates API, Streamlit app, and optional nginx proxy
# =============================================================================

services:
  # -----------------------------------------------------------------------------
  # FastAPI - Backend ML Prediction Service
  # -----------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mlb-api
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - mlb-network

  # -----------------------------------------------------------------------------
  # Streamlit - Frontend Web Application
  # -----------------------------------------------------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mlb-streamlit
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./cache:/app/cache
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    networks:
      - mlb-network

  # -----------------------------------------------------------------------------
  # Nginx - Reverse Proxy (optional, for production)
  # -----------------------------------------------------------------------------
  # nginx:
  #   image: nginx:latest
  #   container_name: mlb-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api
  #     - streamlit
  #   networks:
  #     - mlb-network

# -----------------------------------------------------------------------------
# Redes
# -----------------------------------------------------------------------------
networks:
  mlb-network:
    driver: bridge

# -----------------------------------------------------------------------------
# Volúmenes persistentes
# -----------------------------------------------------------------------------
# Los datos se mantienen en los directorios locales mountados
